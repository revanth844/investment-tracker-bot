      const NEWS = [
        {

          symbol: "TITAN",
          text: "Q3 jewellery revenue beats estimates",
          impact: "pos",
        },
        {
          date: "2026-03-28",
          symbol: "TITAN",
          text: "Gold prices hit record high",
          impact: "neu",
        },
        {
          date: "2026-04-10",
          symbol: "TITAN",
          text: "Fastrack launch; analyst upgrades to Buy",
          impact: "pos",
        },
        {
          date: "2026-04-17",
          symbol: "HAPPSTMNDS",
          text: "Mixed IT sector Q4 outlook",
          impact: "neu",
        },
        {
          date: "2026-04-22",
          symbol: "ALL",
          text: "Markets rally on RBI rate cut expectations",
          impact: "pos",
        },
        {
          date: "2026-04-23",
          symbol: "RELIANCE",
          text: "AGM announced; JioMart expansion",
          impact: "pos",
        },
        {
          date: "2026-04-24",
          symbol: "HDFCPVTBAN",
          text: "HDFC Bank Q4: NIM pressure, AQ improves",
          impact: "neu",
        },
      ];

      let sel = 0,
        period = 14,
        chart = null;
      const sign = (v) => (v >= 0 ? "+" : "");
      const cls = (v) => (Math.abs(v) < 0.5 ? "neu" : v > 0 ? "pos" : "neg");

      // ── Rebase utility ─────────────────────────────────────────────────────────
      function rebase(prices) {
        if (!prices || !prices.length) return [];
        const b = prices[0];
        return prices.map((p) => +((p / b) * 100).toFixed(2));
      }

      function pct(rb) {
        return rb && rb.length ? +(rb[rb.length - 1] - 100).toFixed(2) : 0;
      }

      // ── Render cards ──────────────────────────────────────────────────────────
      function renderCards() {
        document.getElementById("cards").innerHTML = RECS.map(
          (r, i) => `
    <div class="card ${i === sel ? "active" : ""}" onclick="pick(${i})">
      <div class="sym">${r.label}</div>
      <div class="meta">Rec: ${r.buy_date}</div>
      <div class="price">Buy ₹${r.buy_low}–${r.buy_high}</div>
      ${r.target ? `<div class="target">Target ₹${r.target}</div>` : ""}
      <div class="tag">${r.type}</div>
    </div>`,
        ).join("");
      }

      // ── Render performance badges ─────────────────────────────────────────────
      function renderPerf(rb_s, rb_n, rb_x, rec) {
        const sp = pct(rb_s),
          np = pct(rb_n),
          xp = pct(rb_x),
          al = +(sp - np).toFixed(2);
        document.getElementById("perf").innerHTML = `
    <div class="badge ${cls(sp)}">${rec.label}: ${sign(sp)}${sp}%</div>
    <div class="badge ${cls(np)}">Nifty 50: ${sign(np)}${np}%</div>
    <div class="badge ${cls(xp)}">Sensex: ${sign(xp)}${xp}%</div>
    <div class="badge ${cls(al)}">Alpha vs Nifty: ${sign(al)}${al}%</div>`;
      }

      // ── Build chart ───────────────────────────────────────────────────────────
      function buildChart(rec) {
        if (chart) {
          chart.destroy();
          chart = null;
        }
        const ctx = document.getElementById("chart");
        const buyDt = new Date(rec.buy_date);
        const today = new Date();
        const maxDays = Math.min(
          period,
          Math.round((today - buyDt) / 86400000),
        );

        // Build date labels from buy_date
        const labels = [];
        for (let i = 0; i <= maxDays; i++) {
          const d = new Date(buyDt);
          d.setDate(d.getDate() + i);
          labels.push(
            d.toLocaleDateString("en-IN", { day: "2-digit", month: "short" }),
          );
        }

        // Use live prices from recs_data if present, else simulate
        const stockPrices =
          rec.stock_closes && rec.stock_closes.length
            ? rec.stock_closes.slice(0, maxDays + 1)
            : simulate(
                rec.buy_low,
                maxDays,
                0.14,
                0.22,
                rec.label.charCodeAt(0),
              );

        const niftyPrices =
          rec.nifty_closes && rec.nifty_closes.length
            ? rec.nifty_closes.slice(0, maxDays + 1)
            : simulate(100, maxDays, 0.1, 0.13, 42);

        const sensexPrices =
          rec.sensex_closes && rec.sensex_closes.length
            ? rec.sensex_closes.slice(0, maxDays + 1)
            : simulate(100, maxDays, 0.09, 0.12, 99);

        const rb_s = rebase(stockPrices);
        const rb_n = rebase(niftyPrices);
        const rb_x = rebase(sensexPrices);

        renderPerf(rb_s, rb_n, rb_x, rec);

        const buyDays = ((today - buyDt) / 86400000) | 0;
        document.getElementById("ctitle").textContent =
          `${rec.name} (${rec.label}) · ${buyDays}d since recommendation`;
        document.getElementById("fetchnote").textContent =
          rec.stock_closes && rec.stock_closes.length
            ? `Live prices fetched at ${"28 Apr 2026 17:30 IST"}`
            : `Simulated prices — live data loaded by bot at ${"28 Apr 2026 17:30 IST"}`;

        // News annotations
        const newsForStock = NEWS.filter(
          (n) => n.symbol === "ALL" || n.symbol === rec.label,
        );
        const newsPlugin = {
          id: "newsMarkers",
          afterDraw(ch) {
            const meta = ch.getDatasetMeta(0);
            if (!meta || !meta.data) return;
            newsForStock.forEach((n) => {
              const nDate = new Date(n.date);
              const idx = Math.round((nDate - buyDt) / 86400000);
              if (idx < 0 || idx >= meta.data.length) return;
              const pt = meta.data[idx];
              const c = ch.ctx;
              c.save();
              c.beginPath();
              c.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
              c.fillStyle =
                n.impact === "pos"
                  ? "#3B6D11"
                  : n.impact === "neg"
                    ? "#A32D2D"
                    : "#888";
              c.fill();
              c.strokeStyle = "#fff";
              c.lineWidth = 1.5;
              c.stroke();
              c.restore();
            });
          },
        };

        const buyLinePlugin = {
          id: "buyLine",
          afterDraw(ch) {
            const {
              ctx,
              chartArea: { top, bottom },
              scales: { x },
            } = ch;
            const xp = x.getPixelForValue(0);
            ctx.save();
            ctx.setLineDash([4, 3]);
            ctx.strokeStyle = "#F0997B";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(xp, top);
            ctx.lineTo(xp, bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            const lbl = `Buy ₹${rec.buy_low}`;
            ctx.font = "bold 10px sans-serif";
            const tw = ctx.measureText(lbl).width;
            ctx.fillStyle = "#F0997B";
            ctx.beginPath();
            ctx.roundRect(xp + 4, top + 6, tw + 10, 18, 3);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.textBaseline = "middle";
            ctx.fillText(lbl, xp + 9, top + 15);
            ctx.restore();
          },
        };

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: rec.label,
                data: rb_s,
                borderColor: "#378ADD",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.3,
                fill: false,
              },
              {
                label: "Nifty 50",
                data: rb_n,
                borderColor: "#1D9E75",
                borderWidth: 1.3,
                pointRadius: 0,
                tension: 0.3,
                fill: false,
                borderDash: [5, 3],
              },
              {
                label: "Sensex",
                data: rb_x,
                borderColor: "#D85A30",
                borderWidth: 1.3,
                pointRadius: 0,
                tension: 0.3,
                fill: false,
                borderDash: [3, 3],
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (c) => `${c.dataset.label}: ${(+c.raw).toFixed(1)}%`,
                },
              },
            },
            scales: {
              x: {
                ticks: { font: { size: 10 }, maxTicksLimit: 10, color: "#888" },
                grid: { color: "rgba(0,0,0,0.04)" },
              },
              y: {
                ticks: {
                  font: { size: 10 },
                  color: "#888",
                  callback: (v) => v.toFixed(0) + "%",
                },
                grid: { color: "rgba(0,0,0,0.04)" },
                title: {
                  display: true,
                  text: "Rebased (100 = buy date)",
                  font: { size: 10 },
                  color: "#aaa",
                },
              },
            },
          },
          plugins: [buyLinePlugin, newsPlugin],
        });
      }

      // ── Simulate prices (fallback when live data absent) ──────────────────────
      function simulate(start, days, drift, vol, seed) {
        let s = seed * 9301 + 49297;
        const rand = () => {
          s = (s * 9301 + 49297) % 233280;
          return s / 233280;
        };
        const prices = [start];
        for (let i = 0; i < days; i++) {
          const prev = prices[prices.length - 1];
          prices.push(
            Math.max(
              prev * 0.8,
              prev *
                (1 + drift / 252 + vol * (rand() - 0.48) * Math.sqrt(1 / 252)),
            ),
          );
        }
        return prices;
      }

      // ── News list ─────────────────────────────────────────────────────────────
      function renderNews() {
        const rec = RECS[sel];
        const relevant = NEWS.filter(
          (n) => n.symbol === "ALL" || n.symbol === rec.label,
        ).sort((a, b) => a.date.localeCompare(b.date));
        const bgmap = {
          pos: ["#eaf3de", "#3b6d11"],
          neg: ["#fcebeb", "#a32d2d"],
          neu: ["#f0eee8", "#555"],
        };
        document.getElementById("newslist").innerHTML =
          relevant
            .map((n) => {
              const [bg, fg] = bgmap[n.impact] || bgmap.neu;
              return `<div class="nitem">
      <div class="ndate" style="background:${bg};color:${fg}">${n.date}</div>
      <div><div class="ntext">${n.text}</div>
           <div class="nsym">${n.symbol === "ALL" ? "All stocks" : n.symbol}</div></div>
    </div>`;
            })
            .join("") ||
          '<div style="font-size:12px;color:#aaa">No news for this stock.</div>';
      }

      // ── Interaction ───────────────────────────────────────────────────────────
      function pick(i) {
        sel = i;
        renderCards();
        buildChart(RECS[i]);
        renderNews();
      }

      document.getElementById("pbtns").addEventListener("click", (e) => {
        if (!e.target.dataset.days) return;
        period = +e.target.dataset.days;
        document
          .querySelectorAll(".pbtn")
          .forEach((b) => b.classList.remove("active"));
        e.target.classList.add("active");
        buildChart(RECS[sel]);
      });

      // ── Init ──────────────────────────────────────────────────────────────────
      renderCards();
      pick(0);
    </script>
  </body>
</html>
